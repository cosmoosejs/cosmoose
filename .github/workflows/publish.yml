name: Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - latest
          - rc
          - beta
          - alpha
          - next

permissions:
  contents: write
  id-token: write

jobs:
  gate:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx run-many --target=lint
      - run: pnpm exec nx run-many --target=test
      - run: pnpm exec nx run-many --target=build

  publish:
    name: Publish Packages
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Guard stable release branch
        if: inputs.channel == 'latest'
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::Stable releases (latest) can only be published from the main branch."
            exit 1
          fi

      - name: Detect first release
        id: first-release
        run: |
          if git tag -l | grep -q .; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--first-release" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve stable specifier
        if: inputs.channel == 'latest'
        id: stable-specifier
        run: |
          # If current version is a pre-release (e.g. 0.1.0-rc.1), graduate to
          # its stable counterpart (0.1.0) by stripping the pre-release suffix.
          # Otherwise, let conventional commits determine the bump.
          FIRST_PKG=$(ls packages/*/package.json | head -1)
          CURRENT=$(node -p "require('./$FIRST_PKG').version")
          if [[ "$CURRENT" == *-* ]]; then
            STABLE=${CURRENT%%-*}
            echo "specifier=$STABLE" >> "$GITHUB_OUTPUT"
          else
            echo "specifier=" >> "$GITHUB_OUTPUT"
          fi

      - name: Version + Changelog (stable)
        if: inputs.channel == 'latest'
        run: pnpm exec nx release --skip-publish ${{ steps.first-release.outputs.flag }} ${{ steps.stable-specifier.outputs.specifier && format('--specifier={0}', steps.stable-specifier.outputs.specifier) || '' }} --verbose

      - name: Version + Changelog (pre-release)
        if: inputs.channel != 'latest'
        run: pnpm exec nx release --skip-publish --preid ${{ inputs.channel }} ${{ steps.first-release.outputs.flag }} --verbose

      - name: Push version commit and tags
        # --no-verify: skip Husky pre-push hook — quality gates already passed in the gate job
        run: git push --follow-tags --no-verify

      - name: Build
        run: pnpm exec nx run-many --target=build

      - name: Publish
        run: pnpm exec nx release publish --tag ${{ inputs.channel }} --verbose
        env:
          NPM_CONFIG_PROVENANCE: true
